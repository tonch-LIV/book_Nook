<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
  <!--<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> if needed-->
  <title>Book Nook &copy; Home</title>
</head>

<body>

  <header>
    <h1>Book Nook</h1>
  </header>

  <main>

    <!-- TABLE SECTION -->
    <section id="tableSection">
      <h2>Library</h2>

      <table id="bookTable">
        <thead>
          <tr>
            <th>Author</th>
            <th>Book Name</th>
            <th>Genre</th>
            <th>Pages</th>
            <th>Rating</th>
            <th>Added By</th>
          </tr>
        </thead>

        <tbody>
          <!-- JS will insert rows here -->
        </tbody>
      </table>
    </section>

    <!-- FORM SECTION -->
    <section id="formSection">

      <form id="bookForm">

        <fieldset>
          <legend>Add a Book</legend>
          
          <label for="author">Author</label>
          <input id="author" name="author" placeholder="Last, First" required />

          <label for="title">Book Name</label>
          <input id="title" name="title" required />

          <label for="genre">Genre</label>
          <input id="genre" name="genre" />

          <label for="pages">Pages</label>
          <input id="pages" name="pages" type="number" />

          <label for="rating">Rating</label>
          <input id="rating" name="rating" placeholder="1-5" type="number" min="1" max="5" />

          <label for="addedBy">Added By</label>
          <input id="addedBy" name="addedBy" />

          <label for="review">Review</label>
          <textarea id="review" name="review"></textarea>

          <label for="image">Book Cover</label>
          <input id="image" name="image" placeholder="Image URL (optional)" />
        </fieldset>
        
        <button type="submit">Add Book</button>
      </form>

    </section>

    <!-- REVIEWS SECTION -->
    <section id="reviewsSection">
      <h2>Reviews</h2>
      <div id="reviewsContainer">
        <!-- cards will go here -->
      </div>
    </section>

  </main>

  <footer>
    <script src="app.js"></script>
  </footer>

</body>

</html>
