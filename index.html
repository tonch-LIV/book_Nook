<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
  <!--<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> if needed-->
  <title>Book Nook &copy; Home</title>
</head>

<body>

  <header>
    <h1>Book Nook</h1>
  </header>

  <main>

    <!-- TABLE SECTION -->
    <section id="tableSection">
      <h2>Library</h2>

      <table id="bookTable">
        <thead>
          <tr>
            <th>Author</th>
            <th>Book Name</th>
            <th>Genre</th>
            <th>Pages</th>
            <th>Rating</th>
            <th>Added By</th>
          </tr>
        </thead>

        <tbody>
          <!-- JS will insert rows here -->
        </tbody>
      </table>
    </section>

    <!-- FORM SECTION -->
    <section id="formSection">
      <h2>Add Book</h2>

      <form id="bookForm">
        <input name="author" placeholder="Author (Last, First)" required />
        <input name="title" placeholder="Book Name" required />
        <input name="genre" placeholder="Genre" />
        <input name="pages" type="number" placeholder="Pages" />
        <input name="rating" type="number" min="1" max="5" />
        <input name="addedBy" placeholder="Added By" />
        <textarea name="review" placeholder="Write your review..."></textarea>
        <button type="submit">Add Book</button>
      </form>

    </section>

    <!-- REVIEWS SECTION -->
    <section id="reviewsSection">
      <h2>Reviews</h2>
      <div id="reviewsContainer">
        <!-- cards will go here -->
      </div>
    </section>

  </main>

  <footer>
    <script src="app.js"></script>
  </footer>

</body>

</html>
